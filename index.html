<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra-Optimized x86 Assembly Snake</title>
    <!-- Подключаем стили и JS-библиотеку js-dos v6 -->
    <link rel="stylesheet" href="https://js-dos.com/6.22/current/js-dos.css">
    <script src="https://js-dos.com/6.22/current/js-dos.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        h1 {
            margin: 10px 0 5px 0;
            font-size: 24px;
            color: #4CAF50;
        }
        p {
            margin: 0 0 15px 0;
            color: #aaa;
            font-size: 14px;
        }
        /* Стили для холста DOSBox */
        #jsdos-canvas {
            width: 640px;
            height: 400px;
            border: 4px solid #4CAF50;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #000;
        }
    </style>
</head>
<body>

    <h1>🐍 Ultra-Optimized Assembly Snake</h1>
    <p>Управление: WASD. Нажмите на экран игры, чтобы активировать клавиатуру.</p>

    <!-- [ИСПРАВЛЕНО] Контейнер для рендера игры теперь строго холст <canvas> -->
    <canvas id="jsdos-canvas"></canvas>

    <script>
        // Инициализируем Dosbox на элементе canvas
        Dos(document.getElementById("jsdos-canvas"), {
            wdosboxUrl: "https://js-dos.com/6.22/current/wdosbox.js"
        }).ready((fs, main) => {
            // Распаковываем архив с игрой
            fs.extract("snake.zip").then(() => {
                // Запускаем исполняемый файл игры
                main(["-c", "snake.com"]);
            });
        });
    </script>

</body>
</html>
